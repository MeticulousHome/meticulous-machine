name: Promote or pin image versions

on:
#   schedule:
#     # 1. Entry: Minute when the process will be started [0-60]
#     # 2. Entry: Hour when the process will be started [0-23]
#     # 3. Entry: Day of the month when the process will be started [1-28/29/30/31]
#     # 4. Entry: Month of the year when the process will be started [1-12]
#     # 5. Entry: Weekday when the process will be started [0-6] [0 is Sunday]
#     # from: https://stackoverflow.com/a/16717986
#     - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      image:
        description: Destination image/channel to update
        default: beta
      target_image:
        description: Source image/channel to promote or pin from
        default: nightly

permissions:
  contents: write
  actions: read
  id-token: write

run-name: "Promote ${{ github.event.inputs.target_image || 'nightly' }} to ${{ github.event.inputs.image || 'beta' }}"

jobs:
  promote-or-pin-image:
    name: Promote or pin image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_ORG_WORKFLOW }}@github.com/".insteadOf "git@github.com:"
          # config.sh declares some components (crash-reporter, rauc, hawkbit, psplash)
          # with plain https remotes; they clone anonymously but need the token to push.
          git config --global --add url."https://${{ secrets.GH_ORG_WORKFLOW }}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate promotion request
        id: validate
        run: |
          destination="${{ inputs.image || 'beta' }}"
          source="${{ inputs.target_image || 'nightly' }}"

          if [[ ! "$source" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid source image '${source}'. Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if [[ ! "$destination" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid destination image '${destination}'. Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if [[ "$source" == "nightly" && "$destination" == "stable" ]]; then
            echo "::error::Direct promotion from nightly to stable is forbidden. Promote nightly to beta, then beta to stable."
            exit 1
          fi

          if [[ "$destination" =~ ^(nightly|beta|stable)$ ]]; then
            if [[ ! "$source:$destination" =~ ^(nightly:beta|beta:stable)$ ]]; then
              echo "::error::Channel promotions are limited to nightly->beta and beta->stable. Got ${source}->${destination}."
              exit 1
            fi
          fi

          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "destination=${destination}" >> "$GITHUB_OUTPUT"

      - name: Prepare destination image branch
        run: |
          source="${{ steps.validate.outputs.source }}"
          destination="${{ steps.validate.outputs.destination }}"

          git fetch origin "+refs/heads/*:refs/remotes/origin/*"

          if ! git rev-parse -q --verify "refs/remotes/origin/${source}" >/dev/null; then
            echo "::error::Source image branch '${source}' does not exist. Cannot pin an image from a non-existing branch."
            exit 1
          fi

          if git rev-parse -q --verify "refs/remotes/origin/${destination}" >/dev/null; then
            git checkout -B "$destination" "refs/remotes/origin/${destination}"

            if [[ "$source" != "$destination" ]]; then
              if ! git merge --no-ff --no-edit "refs/remotes/origin/${source}"; then
                git merge --abort || true
                echo "::error::Failed to merge image branch '${source}' into '${destination}'. Resolve the branch conflict and rerun."
                exit 1
              fi
            fi
          else
            git checkout -B "$destination" "refs/remotes/origin/${source}"
            echo "Created destination image branch '${destination}' from '${source}'."
          fi

      - name: Checkout source image component refs
        run: |
          ./update-sources.sh --all --image "${{ steps.validate.outputs.source }}" --firmware --plotter

      - name: Promote branches or pin custom image
        run: |
          ./pin-versions.sh --promote "${{ steps.validate.outputs.source }}" "${{ steps.validate.outputs.destination }}"

      - name: Commit and push changes
        run: |
          destination="${{ steps.validate.outputs.destination }}"
          source="${{ steps.validate.outputs.source }}"

          git add "images/${destination}.versions.sh"

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "image: Promote ${source} to ${destination}"
          fi

          git push origin "HEAD:refs/heads/${destination}"
