name: Build image on config branch

on:
  workflow_call:
    inputs:
      image:
        description: Image/version set to build
        required: true
        type: string
      machine-ref:
        description: Branch to use for this repository's config, services, scripts, and workflows
        required: true
        type: string
      upload_emmc_to_hawkbit:
        description: Upload EMMC bundle to hawkBit
        type: boolean
        default: false
      no-cache:
        description: Force rebuild all components, ignoring cache
        type: boolean
        default: false
    outputs:
      build_version_number:
        description: Generated image build version number
        value: ${{ jobs.generate-version-info.outputs.build_version_number }}

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  preflight:
    name: Validate image config
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Validate requested image
        run: |
          image="${{ inputs.image }}"
          machine_ref="${{ inputs.machine-ref }}"

          if [[ ! "$image" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid image '${image}'. Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if [[ ! "$machine_ref" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid machine-ref '${machine_ref}'. Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if [[ "$image" != "nightly" && ! -f "images/${image}.versions.sh" ]]; then
            echo "::error::images/${image}.versions.sh does not exist on '${machine_ref}'."
            exit 1
          fi

          echo "Building image '${image}' from machine config branch '${machine_ref}'." >> "$GITHUB_STEP_SUMMARY"

  build-components:
    name: Build all image components
    needs: preflight
    secrets: inherit
    uses: ./.github/workflows/build-all-components.yml
    with:
      image: ${{ inputs.image }}
      machine-ref: ${{ inputs.machine-ref }}
      no-cache: ${{ inputs.no-cache }}

  generate-version-info:
    name: Generate version info and changelog
    needs: preflight
    runs-on: ubuntu-24.04
    outputs:
      build_version_number: ${{ steps.generate-build-number.outputs.build_version_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Load changelog history from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- images/changes || true

      - name: Generate build number
        id: generate-build-number
        run: |
          BUILD_VERSION_NUMBER="$(./generate_image_version.sh "${{ github.run_number }}" "${{ inputs.image }}")"
          echo "BUILD_VERSION_NUMBER=${BUILD_VERSION_NUMBER}" >> "$GITHUB_ENV"
          echo "build_version_number=${BUILD_VERSION_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout all component sources
        run: |
          ./update-sources.sh --all --image ${{ inputs.image }} --firmware --plotter

      - name: Generate build info and changelog
        run: |
          ./generate-build-info.sh ${{ inputs.image }} "$BUILD_VERSION_NUMBER"

      - name: Upload version-info artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: |
            components/repo-info/
            images/changes/
          if-no-files-found: error

  build-root:
    name: Build RootFS
    runs-on: ubuntu-24.04
    needs:
      - build-components
      - generate-version-info
    env:
      BUILD_VERSION_NUMBER: ${{ needs.generate-version-info.outputs.build_version_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}@github.com/".insteadOf "git@github.com:"

      - name: Download version-info artifact
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: .

      - name: Download bootloader artifact
        uses: actions/download-artifact@v4
        with:
          name: bootloader
          path: components/bootloader/build/

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: components/linux-build

      - name: Download debian artifact
        uses: actions/download-artifact@v4
        with:
          name: debian
          path: components/debian-base/

      - name: Download crash reporter artifact
        uses: actions/download-artifact@v4
        with:
          name: crash-reporter
          path: components/crash-reporter/target

      - name: Download psplash artifact
        uses: actions/download-artifact@v4
        with:
          name: psplash
          path: components/psplash-build

      - name: Download rauc artifact
        uses: actions/download-artifact@v4
        with:
          name: rauc
          path: components/rauc/build

      - name: Download dial artifact
        uses: actions/download-artifact@v4
        with:
          name: dial
          path: components/meticulous-dial/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: components/meticulous-web-ui/out/

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: components/meticulous-firmware-build

      - name: Download plotter artifact
        uses: actions/download-artifact@v4
        with:
          name: plotter
          path: components/meticulous-plotter-ui/build/

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: components/meticulous-backend-build/

      - name: Download watcher artifact
        uses: actions/download-artifact@v4
        with:
          name: watcher
          path: components/meticulous-watcher-build/

      - name: Install Ubuntu dependencies
        run: ./update-sources.sh --install_ubuntu_dependencies

      - name: Install qemu-img
        run: |
          sudo apt install -y qemu-utils qemu-user-static

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Export pio
        run: echo "/home/runner/.platformio/penv/bin" >> "$GITHUB_PATH"

      - name: Write build channel to image-build-channel
        run: |
          echo "${{ inputs.image }}" | sudo tee ./image-build-channel

      - name: Generate build number and writing it to image-build-version
        run: |
          echo -n "Image build version: " >> "$GITHUB_STEP_SUMMARY"
          echo "$BUILD_VERSION_NUMBER" | sudo tee ./image-build-version >> "$GITHUB_STEP_SUMMARY"

      - name: Build rootfs
        run: |
          sudo ./make-rootfs.sh --all
          sudo cat rootfs/opt/summary.txt | sed 's/ ##$//g' >> "$GITHUB_STEP_SUMMARY"

      - name: Delete original debian rootfs
        run: rm -r ./components/debian-base/rootfs-base.tar.gz

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: meticulous-rootfs.tar.gz
          path: meticulous-rootfs.tar.gz
          if-no-files-found: error

      - name: Build sdcard
        run: sudo ./make-sdcard.sh --image

      - name: Upload SDCard artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdcard.img
          path: sdcard.img
          if-no-files-found: error

      - name: Upload EMMC artifact
        uses: actions/upload-artifact@v4
        with:
          name: emmc.img
          path: emmc.img
          if-no-files-found: error

  build-bundle:
    name: Build RAUC bundle
    needs: build-root
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}@github.com/".insteadOf "git@github.com:"

      - name: Clone private repository
        uses: actions/checkout@v4
        with:
          repository: MeticulousHome/rauc-secrets
          token: ${{ secrets.GH_REPO_WORKFLOW }}
          path: components/rauc-secrets

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: meticulous-rootfs.tar.gz
          path: .

      - name: Download rauc artifact
        uses: actions/download-artifact@v4
        with:
          name: rauc
          path: components/rauc/build

      - name: Install Ubuntu dependencies
        run: |
          sudo apt update && sudo apt install -y pigz
          find components/rauc/build/
          sudo apt install --reinstall ./components/rauc/build/rauc_*_amd64.deb

      - name: Download bootloader artifact
        uses: actions/download-artifact@v4
        with:
          name: bootloader
          path: components/bootloader/build/

      - name: Build Bootloader Bundle
        run: ./make-bootloader-ota.sh --variant "${{ inputs.image }}" --cert components/rauc-secrets/keys/beta.rsa4096.cert.pem --key components/rauc-secrets/keys/beta.rsa4096.key.pem

      - name: Upload Bootloader bundle
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-bundle.raucb
          path: rauc_meticulous_boot_*.raucb
          if-no-files-found: error

      - name: Build Bundles
        run: ./make-ota.sh --variant "${{ inputs.image }}" --cert components/rauc-secrets/keys/beta.rsa4096.cert.pem --key components/rauc-secrets/keys/beta.rsa4096.key.pem

      - name: Upload EMMC bundle
        uses: actions/upload-artifact@v4
        with:
          name: emmc-bundle.raucb
          path: rauc_meticulous_emmc_*.raucb
          if-no-files-found: error

  deploy-emmc-bundle:
    name: Upload EMMC image to hawkbit
    needs: build-bundle
    if: ${{ inputs.upload_emmc_to_hawkbit }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Download emmc bundle
        uses: actions/download-artifact@v4
        with:
          name: emmc-bundle.raucb
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests attrs requests-toolbelt

      - name: Upload emmc bundle
        run: |
          python misc/hawkbit-upload.py \
            "${{ secrets.HAWKBIT_SERVER }}" \
            "${{ secrets.HAWKBIT_PORT }}" \
            *_emmc_*.raucb \
            ${{ secrets.HAWKBIT_USER }} \
            ${{ secrets.HAWKBIT_PASSWORD }} \
            "${{ inputs.image }} EMMC" \
            "${{ inputs.image }} Rootfs EMMC" \
            "$(date -u +'%Y-%m-%dT%H_%M_%S%z')" \
            "${{ inputs.image }}" \
            "emmc"

  build-deployment-image:
    name: Build Deployment Image
    needs: build-root
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.machine-ref }}

      - name: Download sdcard artifact
        uses: actions/download-artifact@v4
        with:
          name: sdcard.img
          path: .

      - name: Download bootloader artifact
        uses: actions/download-artifact@v4
        with:
          name: bootloader
          path: components/bootloader/build/

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: meticulous-rootfs.tar.gz
          path: ./

      - name: Install Ubuntu dependencies
        run: sudo apt update && sudo apt install -y pigz qemu-utils e2fsprogs mount cloud-guest-utils

      - name: Build deployment image
        run: sudo ./make-deployment-image.sh --inplace

      - name: Rename image
        run: sudo mv sdcard.img deployment.img

      - name: Compress image
        run: pigz -kf deployment.img

      - name: Upload deployment image
        uses: actions/upload-artifact@v4
        with:
          name: deployment.img.gz
          path: deployment.img.gz
          if-no-files-found: error
