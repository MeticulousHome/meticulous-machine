name: Build image

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight
  workflow_dispatch:
    inputs:
      upload_emmc_to_hawkbit:
        description: Upload EMMC bundle to hawkBit
        type: boolean
        default: false
      no-cache:
        description: Force rebuild all components, ignoring cache
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  id-token: write
  pages: write

run-name: "Build ${{ github.ref_name }} image"

jobs:
  build-image:
    name: Build via selected branch
    uses: ./.github/workflows/build-image-channel.yml
    with:
      image: ${{ github.ref_name }}
      machine-ref: ${{ github.ref_name }}
      upload_emmc_to_hawkbit: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_emmc_to_hawkbit }}
      no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.no-cache || false }}
    secrets: inherit

  tag-controlled-repos:
    name: Tag controlled component repos
    needs: build-image
    runs-on: ubuntu-24.04
    env:
      IMAGE: ${{ github.ref_name }}
      BUILD_VERSION_NUMBER: ${{ needs.build-image.outputs.build_version_number }}
      BUILD_TAG: ${{ github.ref_name }}/${{ needs.build-image.outputs.build_version_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}:@github.com/".insteadOf "git@github.com:"
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}:@github.com/".insteadOf "https://github.com/"

      - name: Checkout all component sources
        run: ./update-sources.sh --all --image "$IMAGE" --firmware --plotter

      - name: Push build tags
        run: ./tag-controlled-repos.sh --tag "$BUILD_TAG"

  commit-changelog:
    name: Commit changelog to main
    needs: build-image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}@github.com/".insteadOf "git@github.com:"

      - name: Download version-info artifact
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: .

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "images/changes/${{ github.ref_name }}/"

          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "changelog: ${{ github.ref_name }} build #${{ github.run_number }}"
            git push origin HEAD:main
          fi

  deploy-changelog:
    name: Deploy changelog to GitHub Pages
    needs: commit-changelog
    uses: meticuloushome/meticulous-machine/.github/workflows/deploy-changelog.yml@main
