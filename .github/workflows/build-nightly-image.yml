name: Build image

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight
  workflow_dispatch:
    inputs:
      image:
        description: Image/version set to build
        type: string
        default: nightly
      config_branch:
        description: Branch to use for machine config/scripts
        type: choice
        default: auto
        options:
          - auto
          - nightly
          - beta
          - stable
      upload_emmc_to_hawkbit:
        description: Upload EMMC bundle to hawkBit
        type: boolean
        default: false
      no-cache:
        description: Force rebuild all components, ignoring cache
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  id-token: write
  pages: write

run-name: "Build ${{ inputs.image || 'nightly' }} image using ${{ inputs.config_branch || 'auto' }} config"

jobs:
  resolve-config:
    name: Resolve image and config branch
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      machine_ref: ${{ steps.resolve.outputs.machine_ref }}
      no_cache: ${{ steps.resolve.outputs.no_cache }}
      upload_emmc_to_hawkbit: ${{ steps.resolve.outputs.upload_emmc_to_hawkbit }}
    steps:
      - name: Resolve build inputs
        id: resolve
        run: |
          image="${{ inputs.image || 'nightly' }}"
          config_branch="${{ inputs.config_branch || 'auto' }}"

          if [[ ! "$image" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid image '${image}'. Use only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          case "$config_branch" in
            auto)
              case "$image" in
                nightly|beta|stable)
                  machine_ref="$image"
                  ;;
                *)
                  echo "::error::Custom image '${image}' requires config_branch to be nightly, beta, or stable."
                  exit 1
                  ;;
              esac
              ;;
            nightly|beta|stable)
              machine_ref="$config_branch"
              ;;
            *)
              echo "::error::Invalid config_branch '${config_branch}'. Use auto, nightly, beta, or stable."
              exit 1
              ;;
          esac

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            no_cache="${{ inputs.no-cache }}"
            upload_emmc_to_hawkbit="${{ inputs.upload_emmc_to_hawkbit }}"
          else
            no_cache="false"
            upload_emmc_to_hawkbit="true"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "machine_ref=${machine_ref}" >> "$GITHUB_OUTPUT"
          echo "no_cache=${no_cache}" >> "$GITHUB_OUTPUT"
          echo "upload_emmc_to_hawkbit=${upload_emmc_to_hawkbit}" >> "$GITHUB_OUTPUT"

          echo "Image: ${image}" >> "$GITHUB_STEP_SUMMARY"
          echo "Machine config branch: ${machine_ref}" >> "$GITHUB_STEP_SUMMARY"

  build-via-nightly:
    name: Build via nightly config
    needs: resolve-config
    if: ${{ needs.resolve-config.outputs.machine_ref == 'nightly' }}
    uses: meticuloushome/meticulous-machine/.github/workflows/build-image-channel.yml@nightly
    with:
      image: ${{ needs.resolve-config.outputs.image }}
      machine-ref: nightly
      upload_emmc_to_hawkbit: ${{ fromJSON(needs.resolve-config.outputs.upload_emmc_to_hawkbit) }}
      no-cache: ${{ fromJSON(needs.resolve-config.outputs.no_cache) }}
    secrets: inherit

  build-via-beta:
    name: Build via beta config
    needs: resolve-config
    if: ${{ needs.resolve-config.outputs.machine_ref == 'beta' }}
    uses: meticuloushome/meticulous-machine/.github/workflows/build-image-channel.yml@beta
    with:
      image: ${{ needs.resolve-config.outputs.image }}
      machine-ref: beta
      upload_emmc_to_hawkbit: ${{ fromJSON(needs.resolve-config.outputs.upload_emmc_to_hawkbit) }}
      no-cache: ${{ fromJSON(needs.resolve-config.outputs.no_cache) }}
    secrets: inherit

  build-via-stable:
    name: Build via stable config
    needs: resolve-config
    if: ${{ needs.resolve-config.outputs.machine_ref == 'stable' }}
    uses: meticuloushome/meticulous-machine/.github/workflows/build-image-channel.yml@stable
    with:
      image: ${{ needs.resolve-config.outputs.image }}
      machine-ref: stable
      upload_emmc_to_hawkbit: ${{ fromJSON(needs.resolve-config.outputs.upload_emmc_to_hawkbit) }}
      no-cache: ${{ fromJSON(needs.resolve-config.outputs.no_cache) }}
    secrets: inherit

  commit-changelog:
    name: Commit changelog to main
    needs:
      - resolve-config
      - build-via-nightly
      - build-via-beta
      - build-via-stable
    if: >-
      ${{
        always() &&
        !cancelled() &&
        fromJSON(needs.resolve-config.outputs.upload_emmc_to_hawkbit) &&
        (
          needs.build-via-nightly.result == 'success' ||
          needs.build-via-beta.result == 'success' ||
          needs.build-via-stable.result == 'success'
        )
      }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Git authentication
        run: |
          git config --global url."https://${{ secrets.GH_REPO_WORKFLOW }}@github.com/".insteadOf "git@github.com:"

      - name: Download version-info artifact
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: .

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "images/changes/${{ needs.resolve-config.outputs.image }}/"

          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "changelog: ${{ needs.resolve-config.outputs.image }} build #${{ github.run_number }}"
            git push origin HEAD:main
          fi

  deploy-changelog:
    name: Deploy changelog to GitHub Pages
    needs:
      - resolve-config
      - commit-changelog
    if: ${{ fromJSON(needs.resolve-config.outputs.upload_emmc_to_hawkbit) && needs.commit-changelog.result == 'success' }}
    uses: meticuloushome/meticulous-machine/.github/workflows/deploy-changelog.yml@main
